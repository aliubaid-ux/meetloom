<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetLoom | Watch Recording</title>
    <meta name="description" content="Watch this recording on MeetLoom — the free meeting and recording platform.">
    <meta property="og:title" content="MeetLoom Recording">
    <meta property="og:description" content="Watch this screen recording with AI-generated transcript on MeetLoom.">
    <meta property="og:type" content="video.other">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/globals.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>

<body class="min-h-screen flex flex-col">

    <!-- ─── Navbar ──────────────────────────────────────── -->
    <nav class="w-full p-4 flex justify-between items-center glass-panel border-b border-white/5 z-10">
        <a href="/" class="flex items-center gap-2">
            <div
                class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-md">
                <i class="fa-solid fa-video text-white text-xs"></i>
            </div>
            <span class="text-lg font-bold">Quick<span class="gradient-accent">Meet</span></span>
        </a>
        <div class="flex items-center gap-3">
            <button id="btn-copy-link"
                class="btn-primary px-5 py-2.5 rounded-xl font-semibold text-sm flex items-center gap-2 shadow-lg shadow-blue-500/20">
                <i class="fa-regular fa-copy"></i> Copy Link
            </button>
            <a href="/" class="btn-secondary px-5 py-2.5 rounded-xl font-semibold text-sm flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> New Meeting
            </a>
        </div>
    </nav>

    <!-- ─── Main Layout (Loom-style) ────────────────────── -->
    <main class="flex-grow container mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8 max-w-7xl">

        <!-- Video Section (Left) -->
        <div class="flex-1 flex flex-col gap-5 min-w-0">
            <!-- Video Player -->
            <div
                class="bg-slate-800 rounded-2xl overflow-hidden shadow-2xl border border-white/5 aspect-video relative">
                <div id="video-container" class="w-full h-full bg-black flex items-center justify-center">
                    <!-- Skeleton while loading -->
                    <div id="video-skeleton" class="skeleton w-full h-full absolute inset-0"></div>
                    <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500 relative z-10"></i>
                </div>
            </div>

            <!-- Video Meta -->
            <div class="flex flex-col sm:flex-row justify-between items-start gap-4">
                <div>
                    <h1 class="text-2xl font-bold mb-1">MeetLoom Recording</h1>
                    <p class="text-slate-500 text-sm flex items-center gap-2">
                        <i class="fa-solid fa-clock text-xs"></i> Uploaded via MeetLoom
                    </p>
                </div>
                <div class="flex items-center gap-2">
                    <a id="youtube-link" href="#" target="_blank"
                        class="btn-secondary px-4 py-2 rounded-lg text-sm flex items-center gap-2">
                        <i class="fa-brands fa-youtube text-red-500"></i> View on YouTube
                    </a>
                </div>
            </div>
        </div>

        <!-- Transcript Section (Right) -->
        <div class="w-full lg:w-[420px] flex flex-col gap-4 flex-shrink-0">
            <div
                class="bg-slate-800/50 rounded-2xl border border-white/5 flex flex-col h-[500px] lg:h-[calc(100vh-10rem)] shadow-xl">

                <!-- Transcript Header -->
                <div class="p-4 border-b border-white/5 flex justify-between items-center">
                    <h3 class="font-semibold flex items-center gap-2 text-sm">
                        <i class="fa-solid fa-file-lines text-blue-400"></i> Transcript
                    </h3>
                    <div class="flex items-center gap-2">
                        <button id="btn-copy-transcript"
                            class="text-slate-400 hover:text-white transition-colors p-1.5 rounded-lg hover:bg-slate-700"
                            title="Copy Transcript">
                            <i class="fa-regular fa-clipboard text-sm"></i>
                        </button>
                        <button id="btn-download-txt"
                            class="text-slate-400 hover:text-white transition-colors p-1.5 rounded-lg hover:bg-slate-700"
                            title="Download .txt">
                            <i class="fa-solid fa-download text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- Transcript Body -->
                <div id="transcript-container"
                    class="p-4 flex-1 overflow-y-auto text-sm text-slate-300 leading-relaxed space-y-3">
                    <!-- Default loading state -->
                    <div id="transcript-loading"
                        class="flex flex-col items-center justify-center h-full text-slate-500 gap-3 text-center">
                        <div class="w-14 h-14 rounded-xl bg-blue-500/10 flex items-center justify-center">
                            <i class="fa-solid fa-hourglass-half text-blue-400 text-xl animate-pulse"></i>
                        </div>
                        <p class="font-medium">Generating captions...</p>
                        <p class="text-xs text-slate-600 max-w-xs">YouTube takes a few minutes to process and generate
                            AI captions after upload.</p>
                        <button id="btn-refresh-transcript"
                            class="mt-3 text-blue-400 hover:text-blue-300 text-xs font-semibold border border-slate-700 hover:border-blue-500 px-4 py-2 rounded-full transition-all">
                            <i class="fa-solid fa-arrows-rotate mr-1"></i> Check Again
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const pathParts = window.location.pathname.split('/');
        window.VIDEO_ID = pathParts[pathParts.length - 1];
    </script>
    <script src="/js/watch.js"></script>
</body>

</html>
